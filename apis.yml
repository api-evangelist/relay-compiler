apis:
  - aid: relay-compiler:relay-compiler
    name: Relay Compiler
    description: >-
      The Relay Compiler is Meta's ahead-of-time GraphQL compiler that generates
      optimized runtime artifacts and type-safe code for Relay applications. It
      processes GraphQL fragments in JavaScript/TypeScript source code, aggregates
      data requirements, optimizes queries, and generates TypeScript or Flow types.
      The compiler enforces GraphQL best practices including connection patterns,
      pagination fragments, and data masking.
    humanURL: https://relay.dev
    tags:
      - Compiler
      - GraphQL
      - Code Generation
      - Build Tool
      - TypeScript
      - Flow
    properties:
      - type: Documentation
        url: https://relay.dev/docs/
      - type: Getting Started
        url: https://relay.dev/docs/getting-started/
      - type: API Reference
        url: https://relay.dev/docs/api-reference/graphql-and-directives/
      - type: GitHub Repository
        url: https://github.com/facebook/relay
      - type: Releases
        url: https://github.com/facebook/relay/releases

  - aid: relay-compiler:relay-runtime
    name: Relay Runtime
    description: >-
      The Relay Runtime provides the client-side execution environment for Relay
      applications. It includes the normalized in-memory store, network layer,
      and React hooks including usePreloadedQuery, useFragment, usePaginationFragment,
      useRefetchableFragment, useMutation, and useSubscription for declarative
      data-fetching in React components.
    humanURL: https://relay.dev/docs/api-reference/
    tags:
      - Runtime
      - React Hooks
      - State Management
      - GraphQL Client
      - Data Fetching
    properties:
      - type: Documentation
        url: https://relay.dev/docs/api-reference/
