aid: relay-compiler
name: Relay Compiler
description: >-
  Relay is Meta's open-source JavaScript framework and ahead-of-time GraphQL compiler
  for building data-driven React applications. The Relay Compiler scans JavaScript
  code for GraphQL fragments, aggregates and optimizes data requirements for entire
  apps, pre-computes queries at build time for efficient runtime performance, and
  generates TypeScript/Flow types for React components. It supports pagination,
  mutations, subscriptions, and deferred data streaming via GraphQL directives.
type: Index
